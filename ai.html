<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>FR AI - المساعد البرمجي</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial; margin: 0; }
        .chat-container { max-width: 100%; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #8b0000; padding: 20px; text-align: center; font-weight: bold; }
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; background: #111; }
        .message { margin: 10px 0; padding: 15px; border-radius: 10px; max-width: 80%; }
        .user { background: #1a3a1a; margin-left: auto; border-right: 4px solid #0f0; }
        .ai { background: #1a1a1a; margin-right: auto; border-left: 4px solid #ff0000; }
        .input-area { display: flex; padding: 20px; background: #222; border-top: 2px solid #ff0000; }
        select, input, button { padding: 15px; border: none; font-size: 1em; }
        select { background: #333; color: #fff; width: 30%; }
        input { flex: 1; background: #444; color: #fff; margin: 0 10px; }
        button { background: #ff0000; color: #fff; cursor: pointer; font-weight: bold; }
        pre { background: #000; padding: 10px; border-radius: 5px; overflow-x: auto; color: #0f0; direction: ltr; text-align: left; }
        .lang-tag { color: #ff0000; font-size: 0.8em; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            🤖 FR AI - مساعد البرمجة الخارق<br>
            <small>يدعم: Lua, C++, C#, Java, HTML, Python, JavaScript</small>
        </div>
        
        <div class="chat-box" id="chatBox">
            <div class="message ai">
                <div class="lang-tag">FR AI</div>
                أهلاً بك في FR HUB. اختر اللغة واطلب الكود الذي تحتاجه. أنا هنا لأبرمج لك أدوات الاختراق والغش.
            </div>
        </div>

        <div class="input-area">
            <select id="langSelect">
                <option value="lua">Lua (روبلوكس)</option>
                <option value="cpp">C++ (هاكر)</option>
                <option value="csharp">C# (تطبيقات)</option>
                <option value="java">Java (أندرويد)</option>
                <option value="html">HTML (واجهات)</option>
                <option value="python">Python (سكربتات)</option>
            </select>
            <input type="text" id="userInput" placeholder="اكتب طلبك هنا... مثال: سكربت غش سرعة للروبلوكس">
            <button onclick="sendMessage()">إرسال</button>
        </div>
    </div>

    <script>
        const responses = {
            lua: {
                speed: `-- FR HUB - سكربت سرعة الروبلوكس
local player = game.Players.LocalPlayer
local char = player.Character or player.CharacterAdded:Wait()
local humanoid = char:WaitForChild("Humanoid")

-- تغيير السرعة
humanoid.WalkSpeed = 100
humanoid.JumpPower = 120

-- منع التغيير الخارجي
humanoid:GetPropertyChangedSignal("WalkSpeed"):Connect(function()
    humanoid.WalkSpeed = 100
end)`,
                fly: `-- FR HUB - نظام الطيران
local UserInputService = game:GetService("UserInputService")
local player = game.Players.LocalPlayer
local flying = false
local speed = 50

-- كود الطيران الكامل هنا...`
            },
            cpp: `// FR HUB - حقن DLL بلغة C++
#include <windows.h>
#include <iostream>

BOOL APIENTRY DllMain(HMODULE hModule, DWORD reason, LPVOID lpReserved) {
    if (reason == DLL_PROCESS_ATTACH) {
        MessageBoxA(NULL, "FR HUB Injected", "Success", MB_OK);
        // هنا كود الاختراق
    }
    return TRUE;
}`,
            csharp: `// FR HUB - أداة C#
using System;
using System.Diagnostics;

namespace FRHUB {
    class Program {
        static void Main() {
            Console.WriteLine("FR HUB - Starting injection...");
            // كود الحقن هنا
        }
    }
}`
        };

        function sendMessage() {
            const lang = document.getElementById('langSelect').value;
            const input = document.getElementById('userInput').value.toLowerCase();
            const chatBox = document.getElementById('chatBox');
            
            // رسالة المستخدم
            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.innerHTML = `<div class="lang-tag">أنت [${lang.toUpperCase()}]</div>${input}`;
            chatBox.appendChild(userMsg);

            // الرد
            let response = "";
            if (lang === 'lua' && input.includes('سرعة')) {
                response = responses.lua.speed;
            } else if (lang === 'lua' && input.includes('طيران')) {
                response = responses.lua.fly;
            } else if (lang === 'cpp') {
                response = responses.cpp;
            } else if (lang === 'csharp') {
                response = responses.csharp;
            } else {
                response = `// FR HUB - كود ${lang.toUpperCase()}
// طلبك: ${input}
// [الكود سيظهر هنا حسب الطلب]

// هذا مثال على الهيكل الأساسي:
function generateExploit() {
    return "FR HUB © 2025 - Elite Code";
}`;
            }

            const aiMsg = document.createElement('div');
            aiMsg.className = 'message ai';
            aiMsg.innerHTML = `<div class="lang-tag">FR AI [${lang.toUpperCase()}]</div><pre>${response}</pre><br><small>FR HUB © 2025 - استخدم هذا الكود بحذر</small>`;
            chatBox.appendChild(aiMsg);
            
            chatBox.scrollTop = chatBox.scrollHeight;
            document.getElementById('userInput').value = '';
        }

        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
